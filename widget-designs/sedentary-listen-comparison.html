<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久坐助手 · 听劝对比图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #17202a;
    --paper: #f8fafc;
    --muted: #7a8493;
  }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(circle at 12% 18%, rgba(255, 102, 102, .16), transparent 26%),
      radial-gradient(circle at 88% 22%, rgba(52, 211, 153, .18), transparent 28%),
      linear-gradient(180deg, #f7f9fc 0%, #e9eef6 100%);
    color: var(--ink);
    padding: 32px;
  }
  .poster {
    width: min(1120px, 100%);
    aspect-ratio: 16 / 9;
    min-height: 600px;
    background: rgba(255,255,255,.78);
    border: 4px solid var(--ink);
    border-radius: 36px;
    box-shadow: 0 18px 0 rgba(23, 32, 42, .12), 0 34px 80px rgba(23, 32, 42, .15);
    padding: 30px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 22px;
  }
  .head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 24px;
  }
  h1 {
    font-size: clamp(28px, 4vw, 54px);
    line-height: .9;
    font-weight: 950;
    letter-spacing: 0;
  }
  .sub {
    max-width: 350px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    font-weight: 700;
  }
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    min-height: 0;
  }
  .lane {
    border: 4px solid var(--ink);
    border-radius: 30px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    box-shadow: inset 0 -8px 0 rgba(23, 32, 42, .08);
  }
  .lane.bad {
    background: linear-gradient(145deg, #ffb7a1 0%, #ff6767 100%);
  }
  .lane.good {
    background: linear-gradient(145deg, #b9f5ba 0%, #48d88b 100%);
  }
  .lane::after {
    content: "";
    position: absolute;
    top: 18px;
    right: 18px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,.28);
  }
  .lane-title {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lane-title strong {
    font-size: 34px;
    line-height: .95;
    font-weight: 950;
    letter-spacing: 0;
  }
  .pill {
    border: 3px solid var(--ink);
    border-radius: 999px;
    background: #fff;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 950;
    white-space: nowrap;
    box-shadow: 0 4px 0 rgba(23, 32, 42, .16);
  }
  .stage {
    position: relative;
    z-index: 2;
    min-height: 0;
    display: grid;
    place-items: center;
  }
  svg {
    width: 100%;
    height: 100%;
    max-height: 330px;
    overflow: visible;
  }
  .outline {
    fill: none;
    stroke: var(--ink);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .thin {
    fill: none;
    stroke: var(--ink);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .face { fill: #fff6d8; stroke: var(--ink); stroke-width: 7; }
  .eye { fill: var(--ink); }
  .white { fill: #fff; stroke: var(--ink); stroke-width: 6; }
  .note {
    position: relative;
    z-index: 2;
    display: grid;
    gap: 12px;
  }
  .word {
    height: 58px;
    border: 4px solid var(--ink);
    border-radius: 29px;
    background: #fff;
    display: grid;
    place-items: center;
    font-size: clamp(26px, 4vw, 42px);
    line-height: 1;
    font-weight: 950;
    letter-spacing: 0;
    box-shadow: 0 7px 0 rgba(23, 32, 42, .2);
  }
  .tags {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .tag {
    min-width: 0;
    border: 3px solid var(--ink);
    border-radius: 16px;
    background: rgba(255,255,255,.72);
    padding: 8px 6px;
    text-align: center;
    font-size: 14px;
    line-height: 1;
    font-weight: 950;
    white-space: nowrap;
  }
  @media (max-width: 780px) {
    body { padding: 16px; }
    .poster {
      aspect-ratio: auto;
      min-height: 0;
      padding: 20px;
    }
    .head { align-items: start; flex-direction: column; }
    .compare { grid-template-columns: 1fr; }
    .lane { min-height: 480px; }
    .lane-title strong { font-size: 28px; }
  }
</style>
</head>
<body>
  <main class="poster">
    <header class="head">
      <h1>同一个提醒<br>两种结局</h1>
      <p class="sub">左边：假装没看见，身体开始抗议。右边：听劝起来动一下，助手立刻给你一点暧昧鼓励。</p>
    </header>

    <section class="compare" aria-label="不听劝和听劝的横向对比">
      <article class="lane bad">
        <div class="lane-title">
          <strong>不听劝</strong>
          <span class="pill">23:00 · 坐麻了</span>
        </div>
        <div class="stage">
          <svg viewBox="0 0 360 270" role="img" aria-label="不听劝坐到腰背报警">
            <path class="outline" d="M72 188 H287"/>
            <path class="white" d="M102 92 H259 Q279 92 279 112 V191 H82 V112 Q82 92 102 92 Z"/>
            <path class="thin" d="M93 139 H270 M128 92 V191 M232 92 V191"/>
            <circle class="face" cx="181" cy="71" r="41"/>
            <path class="thin" d="M158 65 L169 72 M204 65 L193 72"/>
            <path class="thin" d="M164 89 Q181 78 198 89"/>
            <path class="outline" d="M181 113 V151"/>
            <path class="outline" d="M181 129 L143 153 M181 129 L219 153"/>
            <path class="outline" d="M154 167 L128 225 M209 167 L235 225"/>
            <circle cx="211" cy="147" r="16" fill="#fff05a" stroke="#17202a" stroke-width="7"/>
            <path class="thin" d="M235 118 Q260 105 251 82 Q281 98 263 132"/>
            <path class="thin" d="M241 165 Q276 161 267 135 Q294 155 273 184"/>
            <text x="49" y="64" fill="#17202a" font-size="34" font-weight="950">喂?</text>
          </svg>
        </div>
        <div class="note">
          <div class="word">还坐？</div>
          <div class="tags">
            <div class="tag">腿麻</div>
            <div class="tag">腰炸</div>
            <div class="tag">睡不香</div>
          </div>
        </div>
      </article>

      <article class="lane good">
        <div class="lane-title">
          <strong>听劝</strong>
          <span class="pill">23:00 · +2m</span>
        </div>
        <div class="stage">
          <svg viewBox="0 0 360 270" role="img" aria-label="听劝走动后被鼓励">
            <path class="outline" d="M65 222 C112 184 154 244 209 199 C239 174 265 181 294 153"/>
            <path d="M272 55 A35 35 0 1 1 238 21 A24 24 0 1 0 272 55" fill="#ffd86b" stroke="#17202a" stroke-width="6" stroke-linejoin="round"/>
            <path d="M279 105 C279 82 318 82 318 108 C318 134 279 151 279 151 C279 151 240 134 240 108 C240 82 279 82 279 105 Z" fill="#ff6f9f" stroke="#17202a" stroke-width="7" stroke-linejoin="round"/>
            <circle class="face" cx="150" cy="68" r="42"/>
            <circle class="eye" cx="135" cy="63" r="6"/>
            <circle class="eye" cx="166" cy="63" r="6"/>
            <path class="thin" d="M132 84 Q151 103 172 84"/>
            <circle cx="122" cy="76" r="8" fill="#ff6f9f"/>
            <circle cx="180" cy="76" r="8" fill="#ff6f9f"/>
            <path class="outline" d="M151 113 V166"/>
            <path class="outline" d="M149 134 L101 160 M153 134 L199 105"/>
            <path class="outline" d="M151 166 L103 224 M154 166 L210 208"/>
            <path class="white" d="M66 72 L82 101 L51 94 Z"/>
            <path class="white" d="M219 45 L242 67 L210 76 Z"/>
            <text x="229" y="220" fill="#17202a" font-size="38" font-weight="950">乖</text>
          </svg>
        </div>
        <div class="note">
          <div class="word">真乖</div>
          <div class="tags">
            <div class="tag">回血</div>
            <div class="tag">被夸</div>
            <div class="tag">睡更香</div>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
