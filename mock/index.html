<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>火柴人 · Phase 1 Mock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      color: #000;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Phone frame */
    .phone {
      width: 375px;
      height: 812px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }

    /* Status bar (mock) */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 600;
      color: #000;
    }
    .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 13px; }
    .battery {
      width: 24px; height: 11px; border: 1px solid #000; border-radius: 3px; position: relative;
    }
    .battery::after { content: ''; position: absolute; right: -3px; top: 3px; width: 2px; height: 5px; background: #000; border-radius: 0 1px 1px 0; }
    .battery-fill { position: absolute; left: 1px; top: 1px; bottom: 1px; width: 70%; background: #000; border-radius: 1px; }

    /* Home */
    .home {
      width: 100%;
      height: calc(100% - 44px);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .top-meta {
      padding: 12px 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
      letter-spacing: 0.5px;
    }
    .top-meta .now-time { font-variant-numeric: tabular-nums; font-weight: 500; color: #000; font-size: 15px; }
    .top-meta .state-tag { font-size: 13px; color: #666; }

    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .stage svg {
      width: 280px;
      height: 360px;
      transition: opacity 0.4s ease;
    }

    /* Body parts (for animation) */
    .limb {
      transition: all 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
      transform-origin: center;
    }

    /* Speech/caption at bottom */
    .caption {
      padding: 0 32px 16px;
      min-height: 60px;
      text-align: center;
      font-size: 15px;
      color: #333;
      line-height: 1.5;
      transition: opacity 0.3s ease;
    }

    .entry {
      padding: 18px 32px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }
    .entry .arrow { font-size: 18px; color: #999; }

    /* ====== 时间滑块 (24h) ====== */
    .time-slider {
      padding: 0 32px 8px;
      position: relative;
    }
    .time-bubble {
      position: absolute;
      top: -2px;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 5px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
      will-change: left;
    }
    .time-bubble::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid #000;
    }
    .time-track {
      position: relative;
      height: 40px;
      margin: 30px 0 6px;
      touch-action: none;
      cursor: pointer;
    }
    .time-segments {
      position: absolute;
      inset: 14px 0;
      display: flex;
      border-radius: 3px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .time-seg {
      height: 100%;
      position: relative;
    }
    .time-seg::after {
      content: attr(data-name);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.85);
      font-size: 8px;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      pointer-events: none;
    }
    .time-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background: #000;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 1;
      will-change: left;
    }
    .time-thumb::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -16px;
      transform: translateX(-50%);
      width: 1px;
      height: 14px;
      background: #000;
    }
    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #bbb;
      font-variant-numeric: tabular-nums;
    }

    /* 转场动效 */
    .stage { transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.4, 0.0, 0.2, 1); }
    .stage.transitioning { opacity: 0; transform: scale(0.94); }

    /* Long press hint */
    .hint {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* Modal base */
    .modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 10;
    }
    .modal-mask.show {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet {
      width: 100%;
      background: #fff;
      border-radius: 18px 18px 0 0;
      max-height: 85%;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .modal-mask.show .sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 8px auto 4px;
    }
    .sheet-header {
      padding: 8px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-header h2 { font-size: 18px; font-weight: 600; }
    .sheet-header .close { font-size: 24px; color: #999; cursor: pointer; padding: 4px 8px; }

    /* Detail modal */
    .detail-hero {
      padding: 8px 24px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .detail-hero .mini-stick {
      width: 64px; height: 80px;
    }
    .detail-hero .meta { flex: 1; }
    .detail-hero .state-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .detail-hero .since { font-size: 12px; color: #999; }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #f0f0f0;
      margin: 0 24px 24px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .data-cell {
      background: #fff;
      padding: 14px 16px;
    }
    .data-cell .label { font-size: 11px; color: #999; margin-bottom: 4px; letter-spacing: 0.5px; }
    .data-cell .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .data-cell .unit { font-size: 12px; color: #999; font-weight: 400; margin-left: 2px; }

    /* Timeline modal */
    .timeline-page {
      padding: 0 24px 24px;
    }
    .timeline-page h3 { font-size: 14px; font-weight: 500; color: #333; margin: 12px 0 16px; }
    .day-list { list-style: none; }
    .day-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .day-item:last-child { border-bottom: none; }
    .day-time { font-size: 13px; color: #999; width: 60px; font-variant-numeric: tabular-nums; }
    .day-bar {
      flex: 1;
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .day-bar-fill { height: 100%; border-radius: 2px; }
    .day-name { font-size: 14px; color: #333; width: 80px; text-align: right; }

    /* Share toast */
    .toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Demo control bar (outside phone) */
    .demo-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.95);
      border-radius: 100px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 100;
      max-width: 90vw;
      overflow-x: auto;
    }
    .demo-bar::-webkit-scrollbar { display: none; }
    .demo-btn {
      border: none;
      background: transparent;
      color: #666;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 14px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .demo-btn:hover { background: #f0f0f0; }
    .demo-btn.active { background: #000; color: #fff; }

    /* ====== 动效 ====== */
    /* 眨眼 */
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.8s infinite;
    }
    .eye-r { animation-delay: 0.05s; }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      93%, 97%      { transform: scaleY(0.05); }
    }

    /* 呼吸 (头轻微起伏) */
    .head { animation: breathe 3.6s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-1.4px); }
    }

    /* 打字/敲键盘/办公手 (work 系列 + lunch) */
    [data-state="work-am"] .hand,
    [data-state="work-am-1"] .hand,
    [data-state="work-am-2"] .hand,
    [data-state="work-pm"] .hand,
    [data-state="work-pm-1"] .hand,
    [data-state="work-pm-2"] .hand,
    [data-state="work-pm-3"] .hand,
    [data-state="lunch"] .hand {
      animation: typing 0.42s ease-in-out infinite alternate;
    }
    @keyframes typing {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-2px); }
    }

    /* 走路 (commute 全身微弹) */
    [data-state="commute"] { animation: walk-bob 0.55s ease-in-out infinite alternate; }
    @keyframes walk-bob {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-2px); }
    }
    [data-state="commute"] .hand { animation: walk-swing 0.55s ease-in-out infinite alternate; }
    @keyframes walk-swing {
      0%   { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-1.5px) translateX(1.5px); }
    }

    /* 伸懒腰 (wake 全身微微上提再放) */
    [data-state="wake"] { animation: stretch 4s ease-in-out infinite; }
    @keyframes stretch {
      0%, 100% { transform: translateY(0); }
      45%      { transform: translateY(-2.5px); }
      55%      { transform: translateY(-2.5px); }
    }

    /* 刷手机 (evening 手+手机轻浮) */
    [data-state="evening"] .hand { animation: scroll 1.4s ease-in-out infinite; }
    [data-state="evening"] g rect { animation: scroll 1.4s ease-in-out infinite; }
    @keyframes scroll {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-1.5px); }
    }

    /* wc 走动 (腿/手摆) */
    [data-state="wc-am"] { animation: wc-walk 0.6s ease-in-out infinite alternate; }
    [data-state="wc-pm-1"] { animation: wc-walk 0.6s ease-in-out infinite alternate; }
    [data-state="wc-pm-2"] { animation: wc-walk 0.6s ease-in-out infinite alternate; }
    @keyframes wc-walk {
      0%   { transform: translateX(0); }
      100% { transform: translateX(2px); }
    }

    /* 睡觉 Z 浮起 */
    [data-state="sleep"] text, [data-state="nap"] text {
      animation: z-float 2.4s ease-out infinite;
    }
    [data-state="sleep"] text:nth-of-type(2), [data-state="nap"] text:nth-of-type(2) { animation-delay: 0.5s; }
    [data-state="sleep"] text:nth-of-type(3), [data-state="nap"] text:nth-of-type(3) { animation-delay: 1.0s; }
    @keyframes z-float {
      0%   { transform: translateY(0); opacity: 0.95; }
      100% { transform: translateY(-12px); opacity: 0; }
    }

    /* ====== 时间轴 (横向滚动) ====== */
    .timeline {
      margin: 0 24px 24px;
      padding: 16px 0;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
    }
    .timeline-title { font-size: 12px; color: #999; margin-bottom: 12px; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
    .timeline-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #ccc transparent;
      padding-bottom: 4px;
    }
    .timeline-scroll::-webkit-scrollbar { height: 4px; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
    .timeline-axis {
      display: flex;
      height: 36px;
      border-radius: 4px;
      overflow: hidden;
      background: #f5f5f5;
      min-width: 720px;  /* 强制横向滚动 (15 段 × ~48px) */
    }
    .timeline-block {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 9px;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
      transition: filter 0.2s;
    }
    .timeline-block.now { filter: brightness(1.15); box-shadow: inset 0 0 0 2px #000; }
    .timeline-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #bbb;
      min-width: 720px;
    }
    .now-marker {
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 2px;
      background: #000;
      pointer-events: none;
    }
    .timeline-wrap { position: relative; }

    @media (max-width: 420px) {
      body { background: #fff; }
      .phone { width: 100vw; height: 100vh; box-shadow: none; }
    }
  </style>
</head>
<body>

  <div class="phone" id="phone">
    <!-- Status bar -->
    <div class="status-bar">
      <div id="statusTime">9:41</div>
      <div class="right">
        <span>5G</span>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <!-- Home -->
    <div class="home">
      <div class="top-meta">
        <div class="now-time" id="nowTime">14:32</div>
        <div class="state-tag" id="stateTag">下午工作中</div>
      </div>

      <div class="stage" id="stage">
        <!-- SVG injected by JS -->
      </div>

      <div class="caption" id="caption">"弓着背呢，肩颈还撑得住？"</div>

      <div class="time-slider">
        <div class="time-bubble" id="timeBubble">14:32</div>
        <div class="time-track" id="timeTrack">
          <div class="time-segments" id="timeSegments"></div>
          <div class="time-thumb" id="timeThumb"></div>
        </div>
        <div class="time-labels">
          <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
        </div>
      </div>

      <div class="entry" id="entryTimeline">
        <span>今日活动轨迹</span>
        <span class="arrow">→</span>
      </div>
    </div>

    <div class="hint">拖动时间轴</div>

    <!-- Detail modal -->
    <div class="modal-mask" id="detailMask">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 id="detailTitle">下午工作中</h2>
          <span class="close" id="detailClose">×</span>
        </div>
        <div class="detail-hero">
          <svg class="mini-stick" id="miniStick" viewBox="0 0 60 80"></svg>
          <div class="meta">
            <div class="state-name" id="detailStateName">坐姿 · 弓背</div>
            <div class="since" id="detailSince">已持续 3 小时 22 分</div>
          </div>
        </div>
        <div class="timeline">
          <div class="timeline-title">
            <span>今日 24 小时 · <span id="nowLabel">14:32</span></span>
            <span style="color:#bbb">← 横向滑动 →</span>
          </div>
          <div class="timeline-scroll" id="timelineScroll">
            <div class="timeline-wrap" style="position:relative">
              <div class="timeline-axis" id="timelineAxis"></div>
              <div class="timeline-labels">
                <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
              </div>
            </div>
          </div>
        </div>
        <div class="data-grid">
          <div class="data-cell">
            <div class="label">步数</div>
            <div class="value" id="dSteps">2,184</div>
          </div>
          <div class="data-cell">
            <div class="label">久坐</div>
            <div class="value">3<span class="unit">h 22m</span></div>
          </div>
          <div class="data-cell">
            <div class="label">心率</div>
            <div class="value">78<span class="unit">bpm</span></div>
          </div>
          <div class="data-cell">
            <div class="label">睡眠</div>
            <div class="value">6.5<span class="unit">h</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline modal -->
    <div class="modal-mask" id="timelineMask">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2>今日活动轨迹</h2>
          <span class="close" id="timelineClose">×</span>
        </div>
        <div class="timeline-page">
          <h3 id="timelineCount">15 个时段 · 一面镜子</h3>
          <ul class="day-list" id="dayList"></ul>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">已生成分享卡片</div>
  </div>

  <!-- Demo bar (outside phone) -->
  <div class="demo-bar" id="demoBar" style="display:none"></div>

  <script>
  // ====== State Machine ======
  // ranges are in minutes since midnight (0–1440)
  // morning: 1 wc break; afternoon: 2 wc breaks
  const STATES = [
    { id: 'wake',      range: [360, 540],   name: '起床',         caption: '站起来了，眼睛还没睁开。', color: '#9DB4C0' },
    { id: 'work-am-1', range: [540, 630],   name: '上午工作',     caption: '坐直了，盯着屏幕。',         color: '#5C6B73' },
    { id: 'wc-am',     range: [630, 645],   name: '上午wc',       caption: '起身去了趟洗手间。',         color: '#B5C4C7' },
    { id: 'work-am-2', range: [645, 720],   name: '上午工作',     caption: '坐直了，盯着屏幕。',         color: '#5C6B73' },
    { id: 'lunch',     range: [720, 780],   name: '午餐',         caption: '嚼着东西，短暂放空。',       color: '#D4A574' },
    { id: 'nap',       range: [780, 840],   name: '午休',         caption: '趴下了，先睡一会儿。',       color: '#A8B5C2' },
    { id: 'work-pm-1', range: [840, 930],   name: '下午工作',     caption: '弓着背呢，肩颈还撑得住？',   color: '#3D4A52' },
    { id: 'wc-pm-1',   range: [930, 945],   name: '下午wc 1',     caption: '去了一趟洗手间（第 1 次）。', color: '#A0AFB5' },
    { id: 'work-pm-2', range: [945, 990],   name: '下午工作',     caption: '弓着背呢，肩颈还撑得住？',   color: '#3D4A52' },
    { id: 'wc-pm-2',   range: [990, 1005],  name: '下午wc 2',     caption: '去了一趟洗手间（第 2 次）。', color: '#A0AFB5' },
    { id: 'work-pm-3', range: [1005, 1080], name: '下午工作',     caption: '弓着背呢，肩颈还撑得住？',   color: '#3D4A52' },
    { id: 'commute',   range: [1080, 1200], name: '下班',         caption: '终于走起来了。',             color: '#7A8B7A' },
    { id: 'evening',   range: [1200, 1320], name: '晚间',         caption: '沙发上瘫着，刷手机。',       color: '#8E7C93' },
    { id: 'bed',       range: [1320, 1440], name: '准备睡',       caption: '躺下了，翻来覆去。',         color: '#4A5A6B' },
    { id: 'sleep',     range: [0, 360],     name: '深夜',         caption: '睡着了，Zzz...',             color: '#2C3E50' },
  ];

  let manualStateId = null; // override

    if (manualStateId) return STATES.find(s => s.id === manualStateId);
    return STATES.find(s => {
      const [a, b] = s.range;
      if (a < b) return mins >= a && mins < b;
      // wrap midnight, e.g. sleep [0, 360]
      return mins >= a || mins < b;

  // ====== Update functions ======
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function fmtMin(mins) { return pad(Math.floor(mins / 60)) + ':' + pad(mins % 60); }

  function update() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const totalMin = h * 60 + m;
    const state = getStateByMinutes(totalMin);

    document.getElementById('nowTime').textContent = pad(h) + ':' + pad(m);
    document.getElementById('statusTime').textContent = pad(h) + ':' + pad(m);
    document.getElementById('nowLabel').textContent = pad(h) + ':' + pad(m);
    document.getElementById('stateTag').textContent = state.name;
    document.getElementById('caption').textContent = '"' + state.caption + '"';
    document.getElementById('detailTitle').textContent = state.name;
    document.getElementById('detailStateName').textContent = state.name + ' · 持续状态';
    // since time
    const sinceMin = computeSince(state, totalMin);
    document.getElementById('detailSince').textContent = '已持续 ' + sinceMin;

    // mock step count
    const steps = computeSteps(totalMin);
    document.getElementById('dSteps').textContent = steps.toLocaleString();

    renderStickman(state);
    const mini = document.getElementById('miniStick');
    if (mini) mini.innerHTML = buildStickmanSVG(state.id).replace(/<\/?svg[^>]*>/g, '').replace(/viewBox="[^"]*"/, '');

    // highlight current block on timeline
    document.querySelectorAll('.timeline-block').forEach(b => b.classList.remove('now'));
    const idx = STATES.findIndex(s => s.id === state.id);
    if (idx >= 0) {
      const blocks = document.querySelectorAll('.timeline-block');
      if (blocks[idx]) blocks[idx].classList.add('now');
    }
    // auto-scroll the timeline to current block
    const scrollEl = document.getElementById('timelineScroll');
    if (scrollEl && idx >= 0) {
      const blocks = scrollEl.querySelectorAll('.timeline-block');
      const target = blocks[idx];
      if (target) {
        const tRect = target.getBoundingClientRect();
        const sRect = scrollEl.getBoundingClientRect();
        const offset = tRect.left - sRect.left - sRect.width / 2 + tRect.width / 2;
        scrollEl.scrollTo({ left: scrollEl.scrollLeft + offset, behavior: 'smooth' });
      }
    }
  }

  function computeSince(state, totalMin) {
    const [a] = state.range;
    let diff = totalMin - a;
    if (diff < 0) diff += 1440;
    const hh = Math.floor(diff / 60);
    const mm = diff % 60;
    if (hh === 0) return mm + ' 分';
    return hh + ' 小时 ' + mm + ' 分';
  }

  function computeSteps(totalMin) {
    // mock: steps grow by time-of-day
    if (totalMin < 360) return Math.floor(100 + totalMin * 0.3);
    if (totalMin < 540) return Math.floor(800 + (totalMin - 360) * 2.5);
    if (totalMin < 1080) return Math.floor(2400 + (totalMin - 540) * 1.2);
    if (totalMin < 1320) return Math.floor(5500 + (totalMin - 1080) * 2.5);
    return Math.floor(8000 + (totalMin - 1320) * 0.5);
  }

  // ====== Timeline ======
  function buildTimeline() {
    const axis = document.getElementById('timelineAxis');
    axis.innerHTML = '';
    STATES.forEach(s => {
      const [a, b] = s.range;
      const dur = b > a ? b - a : (1440 - a + b);
      const block = document.createElement('div');
      block.className = 'timeline-block';
      block.style.flex = dur;
      block.style.background = s.color;
      block.title = s.name + ' ' + fmtMin(a) + '–' + fmtMin(b);
      block.textContent = dur >= 30 ? s.name : '';
      axis.appendChild(block);
    });
  }

  function buildDayList() {
    const list = document.getElementById('dayList');
    document.getElementById('timelineCount').textContent = STATES.length + ' 个时段 · 一面镜子';
    list.innerHTML = '';
    STATES.forEach(s => {
      const li = document.createElement('li');
      li.className = 'day-item';
      const [a, b] = s.range;
      const dur = b > a ? b - a : (1440 - a + b);
      li.innerHTML = `
        <span class="day-time">${fmtMin(a)}</span>
        <span class="day-bar"><span class="day-bar-fill" style="background:${s.color}; width:100%"></span></span>
        <span class="day-name">${s.name} <span style="color:#bbb;font-size:11px;">${dur}m</span></span>
      `;
      list.appendChild(li);
    });
  }

  // ====== Interactions ======
  function openModal(id) {
    const m = document.getElementById(id);
    m.classList.add('show');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }
  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  document.getElementById('stage').addEventListener('click', () => {
    openModal('detailMask');
  });

  document.getElementById('entryTimeline').addEventListener('click', () => {
    openModal('timelineMask');
  });

  document.getElementById('detailClose').addEventListener('click', () => closeModal('detailMask'));
  document.getElementById('timelineClose').addEventListener('click', () => closeModal('timelineMask'));
  document.getElementById('detailMask').addEventListener('click', (e) => {
    if (e.target.id === 'detailMask') closeModal('detailMask');
  });
  document.getElementById('timelineMask').addEventListener('click', (e) => {
    if (e.target.id === 'timelineMask') closeModal('timelineMask');
  });

  // long press to share
  let pressTimer = null;
  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', startPress);
  stage.addEventListener('mousedown', startPress);
  stage.addEventListener('touchend', endPress);
  stage.addEventListener('mouseup', endPress);
  stage.addEventListener('mouseleave', endPress);
  function startPress() {
    pressTimer = setTimeout(() => showToast('已生成分享卡片（mock）'), 600);
  }
  function endPress() {
    if (pressTimer) clearTimeout(pressTimer);
  }

  // ====== Time slider (24h) ======
  let currentMins = null;     // 当前选定的时间 (分钟)
  let lastRenderedStateId = null;
  let pendingTimer = null;

  function buildTimeSlider() {
    const seg = document.getElementById('timeSegments');
    STATES.forEach(s => {
      const [a, b] = s.range;
      const dur = b > a ? b - a : (1440 - a + b);
      const block = document.createElement('div');
      block.className = 'time-seg';
      block.style.flex = dur;
      block.style.background = s.color;
      block.dataset.name = s.name;
      seg.appendChild(block);
    });
  }

  function setTime(mins, opts={}) {
    if (mins < 0) mins = 0;
    if (mins > 1440) mins = 1440;
    // snap to 5 min
    mins = Math.round(mins / 5) * 5;
    currentMins = mins;
    const pct = (mins / 1440) * 100;
    document.getElementById('timeThumb').style.left = pct + '%';
    document.getElementById('timeBubble').style.left = pct + '%';
    document.getElementById('timeBubble').textContent = fmtMin(mins);
    applyState(getStateByMinutes(mins), opts);
  }

  function applyState(state, opts={}) {
    // 高亮当前段
    document.querySelectorAll('.time-seg').forEach((b, i) => {
      b.style.outline = (STATES[i].id === state.id) ? '2px solid #000' : 'none';
      b.style.outlineOffset = '-2px';
    });

    // 转场动效: 状态切换时短暂淡出 → 替换 SVG → 淡入
    const stage = document.getElementById('stage');
    const stateChanged = (state.id !== lastRenderedStateId);
    if (stateChanged && !opts.skipTransition) {
      stage.classList.add('transitioning');
      if (pendingTimer) clearTimeout(pendingTimer);
      pendingTimer = setTimeout(() => {
        renderStickman(state);
        lastRenderedStateId = state.id;
        requestAnimationFrame(() => stage.classList.remove('transitioning'));
      }, 220);
    } else {
      renderStickman(state);
      lastRenderedStateId = state.id;
    }

    // 同步其它 UI
    const totalMin = currentMins;
    document.getElementById('stateTag').textContent = state.name;
    document.getElementById('caption').textContent = '"' + state.caption + '"';
    document.getElementById('detailTitle').textContent = state.name;
    document.getElementById('detailStateName').textContent = state.name + ' · 持续状态';
    document.getElementById('detailSince').textContent = '已持续 ' + computeSince(state, totalMin);
    document.getElementById('dSteps').textContent = computeSteps(totalMin).toLocaleString();

    const mini = document.getElementById('miniStick');
    if (mini) mini.innerHTML = buildStickmanSVG(state.id).replace(/<\/?svg[^>]*>/g, '').replace(/viewBox="[^"]*"/, '');

    // 详情时间轴高亮 + 滚动
    document.querySelectorAll('.timeline-block').forEach(b => b.classList.remove('now'));
    const idx = STATES.findIndex(s => s.id === state.id);
    if (idx >= 0) {
      const blocks = document.querySelectorAll('.timeline-block');
      if (blocks[idx]) blocks[idx].classList.add('now');
    }
  }

  // 滑块拖动
  (function initSlider() {
    const track = document.getElementById('timeTrack');
    let dragging = false;

    function xToMins(clientX) {
      const rect = track.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return pct * 1440;
    }

    track.addEventListener('pointerdown', e => {
      dragging = true;
      track.setPointerCapture(e.pointerId);
      setTime(xToMins(e.clientX));
    });
    track.addEventListener('pointermove', e => {
      if (!dragging) return;
      setTime(xToMins(e.clientX));
    });
    track.addEventListener('pointerup', e => { dragging = false; });
    track.addEventListener('pointercancel', e => { dragging = false; });
  })();

  // ====== Init ======
  buildTimeSlider();
  buildTimeline();
  buildDayList();

  // 初始时间: 真实当前时间
  const now0 = new Date();
  setTime(now0.getHours() * 60 + now0.getMinutes(), { skipTransition: true });

  // 真实时间模式: 跟随系统时钟, 1 分钟重新评估
  let realTimeMode = true;
  setInterval(() => {
    if (!realTimeMode) return;
    const now = new Date();
    setTime(now.getHours() * 60 + now.getMinutes());
  }, 60_000);

  // 每秒刷新顶部时间显示
  setInterval(() => {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    document.getElementById('nowTime').textContent = pad(h) + ':' + pad(m);
    document.getElementById('statusTime').textContent = pad(h) + ':' + pad(m);
  }, 1000);
  </script>
</body>
</html>
